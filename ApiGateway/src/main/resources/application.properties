spring.application.name=ApiGateway
server.port=9999

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=Hr-Service
spring.cloud.gateway.routes[0].uri=lb://HR-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/hr/**

spring.cloud.gateway.routes[1].id=Employe-Service
spring.cloud.gateway.routes[1].uri=lb://EMPLOYE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/employee/**

spring.cloud.gateway.routes[2].id=Admin-Service
spring.cloud.gateway.routes[2].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**