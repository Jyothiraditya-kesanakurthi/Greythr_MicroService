<!DOCTYPE html>
<html>
<head>
<title>Signup Page</title>
</head>
<body>
	<h2>Signup</h2>
	<form action="createUser" method="post">
		<label for="fullname">Full Name:</label> <input type="text"
			id="fullname" name="empName" required><br>
		<br> <label for="email">Network Id:</label> <input type="email"
			id="email" name="empNetworkId" required><br>
		<br> <label for="password">Password:</label> <input
			type="password" id="password" name="password" required><br>
		<br> <label for="username">Desgination:</label> <input type="text"
			id="username" name="desgination" required><br>
		<br>

		<button type="submit">Sign Up</button>
	</form>
	<p>
		Already have an account? <a href="login.html">Login here</a>
	</p>
</body>
</html>
